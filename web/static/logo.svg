<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#070d14"/>
      <stop offset="100%" stop-color="#0e1a2b"/>
    </linearGradient>
    <linearGradient id="title" x1="80" y1="0" x2="432" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ddeeff"/>
      <stop offset="50%" stop-color="#5aacf7"/>
      <stop offset="100%" stop-color="#38d9f5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- glow -->
  <ellipse cx="256" cy="256" rx="220" ry="180" fill="#1a3a5c" opacity="0.25"/>
  <!-- wordmark -->
  <text x="256" y="282" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="700" letter-spacing="-3" fill="url(#title)" text-anchor="middle">PasteAI</text>
  <!-- tagline -->
  <text x="256" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8ba8c8" text-anchor="middle">The document layer for AI agents</text>
  <!-- accent bar -->
  <rect x="228" y="352" width="56" height="3" rx="2" fill="#5aacf7"/>
</svg>
