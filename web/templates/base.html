<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>{{block "title" .}}PasteAI{{end}}</title>
  <!-- Anti-FOUC: runs before stylesheets so the correct theme is set before first paint -->
  <script>(function(){var t=localStorage.getItem('pasteai-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  {{block "extra-head" .}}{{end}}
</head>
<body>
  <div class="bg-stars" aria-hidden="true"></div>
  <div class="bg-nebula" aria-hidden="true"></div>

  <nav class="nav">
    <a href="/" class="nav-logo">PasteAI</a>
    <a href="/" class="nav-link">Documents</a>
    {{if .NavExtras}}{{.NavExtras}}{{end}}

    <div class="theme-picker" id="theme-picker">
      <button class="theme-btn" id="theme-btn"
              aria-haspopup="listbox" aria-expanded="false"
              onclick="toggleThemePicker()">
        <span class="theme-swatch" id="theme-swatch"></span>
        <span id="theme-label">Light</span>
        <svg class="chevron-icon" width="12" height="12" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </button>
      <div class="theme-menu" id="theme-menu" role="listbox" hidden>
        <button class="theme-option" data-theme-val="light" role="option">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#ef4b58,#008f87)"></span>
          Light
        </button>
        <button class="theme-option" data-theme-val="dark" role="option">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#ff4d4d,#00e5cc)"></span>
          Dark
        </button>
        <button class="theme-option" data-theme-val="emerald" role="option">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#50c878,#3ecfcf)"></span>
          Emerald
        </button>
        <button class="theme-option" data-theme-val="catppuccin-mocha" role="option">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#cba6f7,#89dceb)"></span>
          Mocha
        </button>
        <button class="theme-option" data-theme-val="catppuccin-latte" role="option">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#8839ef,#04a5e5)"></span>
          Latte
        </button>
        <button class="theme-option" data-theme-val="catppuccin-frappe" role="option">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#ca9ee6,#85c1dc)"></span>
          Frappé
        </button>
        <button class="theme-option" data-theme-val="arctic" role="option">
          <span class="theme-swatch" style="background:linear-gradient(135deg,#5aacf7,#38d9f5)"></span>
          Arctic
        </button>
      </div>
    </div>
  </nav>

  {{block "body" .}}{{end}}

  <script>
    var themeLabels = {
      'light':             'Light',
      'dark':              'Dark',
      'emerald':           'Emerald',
      'catppuccin-mocha':  'Mocha',
      'catppuccin-latte':  'Latte',
      'catppuccin-frappe': 'Frappé',
      'arctic':            'Arctic'
    };
    var themeSwatches = {
      'light':             'linear-gradient(135deg,#ef4b58,#008f87)',
      'dark':              'linear-gradient(135deg,#ff4d4d,#00e5cc)',
      'emerald':           'linear-gradient(135deg,#50c878,#3ecfcf)',
      'catppuccin-mocha':  'linear-gradient(135deg,#cba6f7,#89dceb)',
      'catppuccin-latte':  'linear-gradient(135deg,#8839ef,#04a5e5)',
      'catppuccin-frappe': 'linear-gradient(135deg,#ca9ee6,#85c1dc)',
      'arctic':            'linear-gradient(135deg,#5aacf7,#38d9f5)'
    };

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('pasteai-theme', theme);
      updateThemeBtn(theme);
      document.querySelectorAll('.theme-option').forEach(function(opt) {
        opt.classList.toggle('active', opt.dataset.themeVal === theme);
      });
    }

    function updateThemeBtn(theme) {
      var label  = document.getElementById('theme-label');
      var swatch = document.getElementById('theme-swatch');
      if (label)  label.textContent       = themeLabels[theme]  || theme;
      if (swatch) swatch.style.background = themeSwatches[theme] || '';
    }

    function toggleThemePicker() {
      var menu = document.getElementById('theme-menu');
      var btn  = document.getElementById('theme-btn');
      var open = menu.hasAttribute('hidden');
      if (open) {
        menu.removeAttribute('hidden');
        btn.setAttribute('aria-expanded', 'true');
      } else {
        menu.setAttribute('hidden', '');
        btn.setAttribute('aria-expanded', 'false');
      }
    }

    function closeThemePicker() {
      document.getElementById('theme-menu').setAttribute('hidden', '');
      document.getElementById('theme-btn').setAttribute('aria-expanded', 'false');
    }

    document.addEventListener('click', function(e) {
      var picker = document.getElementById('theme-picker');
      if (picker && !picker.contains(e.target)) { closeThemePicker(); }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { closeThemePicker(); }
    });

    document.querySelectorAll('.theme-option').forEach(function(btn) {
      btn.addEventListener('click', function() {
        setTheme(this.dataset.themeVal);
        closeThemePicker();
      });
    });

    (function() {
      var t = localStorage.getItem('pasteai-theme') || 'light';
      updateThemeBtn(t);
      document.querySelectorAll('.theme-option').forEach(function(opt) {
        opt.classList.toggle('active', opt.dataset.themeVal === t);
      });
      // Enable theme transitions only after initial paint to prevent FOUC.
      document.documentElement.classList.add('theme-loaded');
    })();
  </script>
</body>
</html>
